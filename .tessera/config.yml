# Tessera tuning configuration — Tessera's own.
#
# COMMITTED, not gitignored: a test command that vanishes on a fresh clone is useless to the
# unsupervised agent it exists for. Keep secrets out; this file is for toolchain facts.
#
# Only keys that something ACTUALLY READS belong here. A knob that silently does nothing is
# worse than no knob — it grants false assurance. See scripts/tessera_config.py.

# --- toolchain (read by bin/tessera-test) ---
#
# Runs EVERY suite. It is a script, not a bare pytest call, because scripts/gate/ and
# scripts/override/ each contain an emit.py and a scan.py and collide in one pytest process —
# so they need separate processes. The first version of this key ENUMERATED six test files and
# silently skipped half the suite while reporting green. See scripts/run-tests.sh.
#
# The script resolves `.venv/bin/python` — a PATH, not a NAME. It used to pin `python3.13`,
# and on 2026-07-12 `uv python install` shimmed that very name into ~/.local/bin ahead of
# Homebrew: the name silently became a different interpreter with no pytest. F-001's shape.
# There is no fallback to `python3`; run-tests.sh fails loudly if the venv is missing.
test: bash scripts/run-tests.sh
